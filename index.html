<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: SVG for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG fallbacks -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- Legacy ICO -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Default dark; boot script + React keep theme-color in sync -->
    <meta name="theme-color" content="#252525" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply stored theme before paint to avoid light/dark FOUC (default: dark) -->
    <script>
      try {
        var t = localStorage.getItem('theme')
        // Explicit light only when user chose light; otherwise dark.
        var dark = t !== 'light'
        if (dark) {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', '#ffffff')
        }
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>

    <title>Panduan AI Skills — Matt Pocock Workflow</title>
    <meta
      name="description"
      content="Panduan interaktif 19 AI coding skills dari Matt Pocock: alur kerja dari ide hingga ship, pola kerja, dan konsep kunci untuk pengembangan software berbasis AI agent."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Skills Guide" />
    <meta property="og:title" content="Panduan AI Skills — Matt Pocock Workflow" />
    <meta
      property="og:description"
      content="Panduan interaktif 19 AI coding skills dari Matt Pocock: alur kerja dari ide hingga ship, pola kerja, dan konsep kunci."
    />
    <meta property="og:url" content="https://skills.stevanuspangau.cloud/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Panduan AI Skills — Matt Pocock Workflow" />
    <meta
      name="twitter:description"
      content="Panduan interaktif 19 AI coding skills dari Matt Pocock untuk pengembangan software berbasis AI agent."
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
