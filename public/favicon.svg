<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg { fill: #000; }
    .stroke { fill: none; stroke: #fff; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
    .node { fill: #fff; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #000; }
      .stroke { stroke: #fff; }
      .node { fill: #fff; }
    }
  </style>
  <!-- Black rounded square background -->
  <rect class="bg" width="512" height="512" rx="96" ry="96"/>
  
  <!-- Curly brace right side -->
  <path class="stroke" d="M 320 120 C 350 120 360 140 360 170 L 360 230 C 360 250 380 256 390 256 C 380 256 360 262 360 282 L 360 342 C 360 372 350 392 320 392"/>
  
  <!-- Neural network nodes and connections -->
  <!-- Layer 1 (input) -->
  <circle class="node" cx="140" cy="180" r="14"/>
  <circle class="node" cx="140" cy="256" r="14"/>
  <circle class="node" cx="140" cy="332" r="14"/>
  
  <!-- Layer 2 (hidden) -->
  <circle class="node" cx="220" cy="200" r="12"/>
  <circle class="node" cx="220" cy="270" r="12"/>
  <circle class="node" cx="220" cy="340" r="12"/>
  <circle class="node" cx="220" cy="160" r="12"/>
  
  <!-- Layer 3 (output connecting to brace) -->
  <circle class="node" cx="295" cy="220" r="11"/>
  <circle class="node" cx="295" cy="290" r="11"/>
  
  <!-- Connections layer 1 to 2 -->
  <line class="stroke" x1="154" y1="180" x2="208" y2="160" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="180" x2="208" y2="200" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="256" x2="208" y2="200" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="256" x2="208" y2="270" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="332" x2="208" y2="270" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="332" x2="208" y2="340" style="stroke-width:5"/>
  <line class="stroke" x1="154" y1="180" x2="208" y2="270" style="stroke-width:4; opacity:0.5"/>
  <line class="stroke" x1="154" y1="256" x2="208" y2="340" style="stroke-width:4; opacity:0.5"/>
  <line class="stroke" x1="154" y1="256" x2="208" y2="160" style="stroke-width:4; opacity:0.5"/>
  
  <!-- Connections layer 2 to 3 -->
  <line class="stroke" x1="232" y1="160" x2="284" y2="220" style="stroke-width:5"/>
  <line class="stroke" x1="232" y1="200" x2="284" y2="220" style="stroke-width:5"/>
  <line class="stroke" x1="232" y1="270" x2="284" y2="290" style="stroke-width:5"/>
  <line class="stroke" x1="232" y1="340" x2="284" y2="290" style="stroke-width:5"/>
  <line class="stroke" x1="232" y1="200" x2="284" y2="290" style="stroke-width:4; opacity:0.5"/>
  <line class="stroke" x1="232" y1="270" x2="284" y2="220" style="stroke-width:4; opacity:0.5"/>
</svg>